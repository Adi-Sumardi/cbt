name: Deploy ke VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # bisa trigger manual dari GitHub UI

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout kode
        uses: actions/checkout@v4

      # ── 2. Setup SSH ─────────────────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # ── 3. Tambah VPS ke known hosts ─────────────────────────────────────────
      - name: Tambah VPS ke known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Deploy ke VPS ─────────────────────────────────────────────────────
      - name: Deploy ke VPS via SSH
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            echo "=== Mulai deployment ==="
            cd /opt/cbt
            bash update.sh
            echo "=== Deployment selesai ==="
          ENDSSH

      # ── 5. Notifikasi sukses ──────────────────────────────────────────────────
      - name: Notifikasi sukses
        if: success()
        run: |
          echo "✅ Deploy ke https://cbt.adilabs.id berhasil!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Oleh  : ${{ github.actor }}"

      # ── 6. Notifikasi gagal ───────────────────────────────────────────────────
      - name: Notifikasi gagal
        if: failure()
        run: |
          echo "❌ Deploy GAGAL!"
          echo "Commit: ${{ github.sha }}"
          echo "Cek log di: https://github.com/${{ github.repository }}/actions"
