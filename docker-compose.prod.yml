services:
  postgres:
    image: postgres:16-alpine
    container_name: cbt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cbt-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cbt_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - cbt-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    image: cbt_api:latest
    container_name: cbt_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    expose:
      - '3001'
    volumes:
      - uploads-data:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cbt-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    image: cbt_web:latest
    container_name: cbt_web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    expose:
      - '3000'
    depends_on:
      - api
    networks:
      - cbt-network

  nginx:
    image: nginx:1.25-alpine
    container_name: cbt_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '8080:80'
    depends_on:
      - web
      - api
    networks:
      - cbt-network

volumes:
  postgres-data:
  redis-data:
  uploads-data:

networks:
  cbt-network:
    driver: bridge
