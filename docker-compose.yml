version: '3.9'

services:
  # ─── Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cbt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cbt}
      POSTGRES_USER: ${POSTGRES_USER:-cbt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cbt_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    networks:
      - cbt-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cbt_user} -d ${POSTGRES_DB:-cbt}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache / Session ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cbt_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-cbt_redis_pass} --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    ports:
      - '6380:6379'
    networks:
      - cbt-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-cbt_redis_pass}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (NestJS) ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: ${NODE_ENV:-development}
    container_name: cbt_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cbt_user}:${POSTGRES_PASSWORD:-cbt_password}@postgres:5432/${POSTGRES_DB:-cbt}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cbt_redis_pass}@redis:6379
    # Sembunyikan port langsung ke host agar semua request melewati Load Balancer Nginx
    expose:
      - '3001'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cbt-network

  # ─── Web (Next.js) ───────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: ${NODE_ENV:-development}
    container_name: cbt_web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
    # Sembunyikan port langsung ke host agar semua request melewati Load Balancer Nginx
    expose:
      - '3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
    depends_on:
      - api
    networks:
      - cbt-network

  # ─── Load Balancer (Nginx) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cbt_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
    depends_on:
      - web
      - api
    networks:
      - cbt-network

volumes:
  postgres-data:
  redis-data:

networks:
  cbt-network:
    driver: bridge
